services:
  # ── Frontend Static Site (FREE on Render — static sites have no plan cost) ───
  - type: web
    name: test-simulator-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set to your Koyeb backend URL after deploying backend
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# NOTE: The backend API is deployed separately on Koyeb (free tier).
# Render removed free web service plans in 2024.
# See README.md → Hosting section for Koyeb setup instructions.
