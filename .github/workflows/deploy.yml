name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend lint & type-check ────────────────────────────────────────────────
  backend:
    name: Backend – lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py
      - run: python -c "from app.core.config import Settings; print('Config OK')"
        env:
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost/test"
          ALLOWED_ORIGINS: "http://localhost:5173"

  # ── Frontend build ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend – build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ""
          VITE_SUPABASE_URL: "https://placeholder.supabase.co"
          VITE_SUPABASE_ANON_KEY: "placeholder"

  # ── Trigger deploys on main push ─────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Koyeb auto-deploys from GitHub pushes — no webhook needed.
      # Render static site auto-deploys from GitHub pushes — no webhook needed.
      # Add manual webhook triggers below if you disable auto-deploy in the dashboards.
      - name: Trigger Render frontend deploy (optional manual hook)
        if: vars.RENDER_FRONTEND_HOOK != ''
        run: curl -s -o /dev/null "${{ vars.RENDER_FRONTEND_HOOK }}"
